[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --cov=src --cov-report=term-missing --cov-report=html:output/htmlcov
markers =
    unit: unit tests
    integration: integration tests
    stress: stress / performance tests
    e2e: end-to-end tests
    security: security tests
    gpu: tests that require a CUDA-capable GPU (skipped when unavailable)
    slow: long-running tests (deselect with -m "not slow")
    network: tests that download models or need internet (skipped offline)
