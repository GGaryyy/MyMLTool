# Feature Selection 設定範例 — 中文 (繁中) 特徵篩選分析與建議
# 用法:
#   python -m src.nlp.cli feature-select --config configs/feature_select.example.yaml
#
# 產出「特徵選擇建議報告」到 output_dir/feature_selection/：
#   - 詞彙/n-gram 篩選：χ²/MI/ANOVA/L1/樹重要度 方法比較、推薦保留特徵數、
#     推薦 n-gram range、冗餘詞對
#   - Metadata 特徵：相關性(對標籤) + 冗餘(Cramér's V/Pearson/VIF) + 建議保留/剔除
# 注意：詞彙層 FS 主要服務 TF-IDF baseline；BERT/句嵌入自學表徵不受影響。

data:
  csv_path: data/train.csv
  text_col: text
  label_col: label
  task_type: multiclass        # multiclass | multilabel
  label_separator: "|"

  # 結構化 metadata 欄位（常見文件屬性）— 會做表格 FS + 相關性分析。
  # 留空 [] 則只跑詞彙層 FS。
  metadata_cols:
    - 部門
    - 文件類型
    - 等級
    - 分類
    - 年度

output_dir: output/nlp
seed: 0
