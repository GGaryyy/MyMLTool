# 公文承辦單位分文預測 — 用 Content 內文預測 Unit 承辦單位
# 用法 (WSL):
#   cd /mnt/d/IT/githubProbject/MyMLTool
#   .venv/bin/python -m src.nlp.cli eda        --config configs/gongwen.yaml
#   .venv/bin/python -m src.nlp.cli benchmark  --config configs/gongwen.yaml

data:
  csv_path:    # ← 改成你的 CSV 路徑
  text_col: Content            # 文字欄 = 公文內文
  label_col: Unit              # 標籤欄 = 承辦單位（要預測的答案）
  task_type: multiclass        # 一篇一個單位 → 單標籤多類別
  test_size: 0.2
  val_size: 0.1
  # 注意：UnitFullName / Unit_Level / Process_UnitID / Report_UnitID 都是
  # 從 Unit 衍生的欄位，屬於答案，不可當特徵（會 leakage）。故 metadata_cols 留空。
  metadata_cols: []

segment:
  engine: spacy                # 字元切分（合規，不用中國套件）

device:
  device: auto                 # 自動用 RTX 4070
  precision: auto              # Ada → bf16

output_dir: output/nlp
seed: 0

models:
  # 傳統 baseline（快、可解釋、CPU）
  - {name: tfidf_logreg,    class_weight: balanced}
  - {name: tfidf_linearsvm, class_weight: balanced}
  - {name: tfidf_nb}
  # 輕量深度（GPU 可加速）
  - {name: textcnn,     epochs: 5, batch_size: 32, max_length: 512}
  - {name: bilstm_attn, epochs: 5, batch_size: 32, max_length: 512}
  # 中文 BERT 微調（首次需下載 google-bert/bert-base-chinese）
  - {name: bert, epochs: 3, batch_size: 16, max_length: 512, class_weight: balanced}
  # 句嵌入 + 線性分類器（少量標註資料常最佳）
  - {name: sent_embed}
