# EDA 設定範例 — 中文 (繁中) 文本資料分析
# 用法 (WSL / 容器內):
#   python -m src.nlp.cli eda --config configs/eda.example.yaml
# 或掛載到容器: -v $(pwd)/configs:/config  然後 --config /config/eda.example.yaml

data:
  csv_path: data/train.csv     # 兩欄以上的 CSV；text 欄與 label 欄如下指定
  text_col: text               # 欄名或整數位置 (0-based)；預設 0
  label_col: label             # 欄名或整數位置；預設 -1 (最後一欄，沿用 repo 慣例)
  task_type: multiclass        # multiclass | multilabel
  label_separator: "|"         # multilabel 時標籤分隔符，如 "人事|預算"

segment:
  engine: spacy                # spacy(char) | char | bert | ckip(需法務核可)
                               # spacy 未安裝時自動退回 char，語義相同

output_dir: output/nlp         # 報告與圖表輸出根目錄
seed: 0
